name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Publish
        run: dotnet publish src/MTerminal/MTerminal.csproj -c Release --self-contained -r win-x64 -o ./publish

      - name: Install Velopack
        run: dotnet tool install -g vpk

      - name: Create Velopack package
        run: vpk pack --packId MTerminal --packVersion ${{ env.VERSION }} --packDir ./publish --mainExe MTerminal.exe

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            Releases/MTerminal-win-Setup.exe
            Releases/MTerminal-win-Portable.zip
            Releases/MTerminal-*-full.nupkg
            Releases/releases.win.json
            Releases/assets.win.json
            Releases/RELEASES

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2

      - name: Publish
        run: dotnet publish src/MTerminal/MTerminal.csproj -c Release --self-contained -r linux-x64 -o ./publish

      - name: Create AppImage structure
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy published files
          cp -r ./publish/* AppDir/usr/bin/
          chmod +x AppDir/usr/bin/MTerminal

          # Copy desktop file and icon
          cp deploy/linux/MTerminal.desktop AppDir/
          cp deploy/linux/AppRun AppDir/
          chmod +x AppDir/AppRun

          # Convert ico to png for AppImage (use the existing png)
          cp src/MTerminal/Assets/mterminal-icon.png AppDir/mterminal.png
          cp src/MTerminal/Assets/mterminal-icon.png AppDir/usr/share/icons/hicolor/256x256/apps/mterminal.png

      - name: Download appimagetool
        run: |
          # appimagetool has no stable versioned releases — "continuous" is their rolling stable.
          # To harden: replace the URL with a specific commit-sha download if supply chain is a concern.
          wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          ARCH=x86_64 ./appimagetool AppDir MTerminal-linux-x86_64.AppImage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: MTerminal-linux-x86_64.AppImage

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MTerminal ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/windows-release/MTerminal-win-Setup.exe
            artifacts/windows-release/MTerminal-win-Portable.zip
            artifacts/windows-release/MTerminal-*-full.nupkg
            artifacts/windows-release/releases.win.json
            artifacts/windows-release/assets.win.json
            artifacts/windows-release/RELEASES
            artifacts/linux-release/MTerminal-linux-x86_64.AppImage
